<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form id="formulario">
        <input type="text" id="nombre" placeholder="Nombre"><br><br>
        <input type="number" id="edad" placeholder="Edad"><br><br>
        <input type="text" id="carrera" placeholder="Carrera"><br><br>
        <input type="email" id="correo" placeholder="Correo"><br><br>

        <button id="agregar">AGREGAR</button>
        <button type="reset">RESETEAR</button>
    </form>

    <div id="resultado" style="display: none;">
        <h3>Datos ingresados:</h3>
        <button onclick="clean()">Eliminar todos</button>

        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Edad</th>
                    <th>Carrera</th>
                    <th>Correo</th>
                    
                </tr>
            </thead>
            <tbody id="contentTabla">
                
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>

</body>
</html>
